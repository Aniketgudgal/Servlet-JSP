<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register User</title>
    <link rel="stylesheet" href="CSS/Register.css" />
  </head>
  <body>
    <div class="container">
      <div class="register-div">
        <div class="title">
          <h1>Registration Form</h1>
        </div>
        <div class="content">
          <form  name = "fregi" action="registerUser" method="post">
          <table>
              <tr>
                <td><label for="fname">First Name:</label></td>
              </tr>
              <tr>
                <td>
                  <input type="text" name="fname" value="" autocomplete="off" />
                </td>
              </tr>
              <tr>
                <td><label for="lname">Last Name:</label></td>
              </tr>
              <tr>
                <td>
                  <input type="text" name="lname" value="" autocomplete="off" />
                </td>
              </tr>
              <tr>
                <td><label for="email">Email:</label></td>
              </tr>
              <tr>
                <td>
                  <input
                    type="email"
                    name="email"
                    value=""
                    autocomplete="off"
                  />
                </td>
              </tr>
              <tr>
                <td><label for="contact">Contact:</label></td>
              </tr>
              <tr>
                <td>
                  <input
                    type="text"
                    name="contact"
                    value=""
                    autocomplete="off"
                  />
                </td>
              </tr>
              <tr>
                <td><label for="password">Password:</label></td>
              </tr>
              <tr>
                <td>
                  <input
                    type="password"
                    name="password"
                    value=""
                    autocomplete="off"
                  />
                </td>
              </tr>
              <tr>
                <td><button>Submit</button></td>
              </tr>
              <tr>
                <td><a href = "login.html" class="sbmt">Login</a></td>
              </tr>
          </table>
            </form>
        </div>
      </div>
    </div>
  </body>
</html>
